services:
  db:
    image: postgres:16-alpine
    container_name: sheet-map-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    # На хосте: если 5432 свободен, замените на "5432:5432" и URL с :5432
    ports:
      - "5433:5432"
    volumes:
      - sheet_map_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  sheet_map_pgdata:
