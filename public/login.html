<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход — Карта точек</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "-apple-system", "sans-serif"],
            },
            boxShadow: { card: "0 1px 3px 0 rgb(0 0 0 / 0.06), 0 4px 12px rgb(0 0 0 / 0.06)" },
          },
        },
      };
    </script>
  </head>
  <body class="flex min-h-screen items-center justify-center bg-slate-50 px-4 py-10 font-sans text-slate-900 antialiased">
    <main class="w-full max-w-md rounded-2xl border border-slate-200 bg-white p-8 shadow-card">
      <div class="mb-8 text-center">
        <p class="text-xs font-semibold uppercase tracking-wider text-blue-600">Карта точек</p>
        <h1 class="mt-2 text-2xl font-bold tracking-tight text-slate-900">Вход</h1>
        <p class="mt-2 text-sm text-slate-600">Войдите, чтобы открыть кабинет и карту.</p>
      </div>

      <div id="login-field-errors" class="mb-4 hidden rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-800" role="alert"></div>
      <p id="login-message" class="mb-5 hidden rounded-xl border px-4 py-3 text-sm" role="status"></p>

      <div class="space-y-5">
        <div>
          <label for="login-email" class="mb-2 block text-sm font-medium text-slate-700">Email</label>
          <input
            id="login-email"
            type="email"
            autocomplete="username"
            class="min-h-12 w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm outline-none ring-blue-600/20 transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-4"
            placeholder="you@company.com"
          />
          <p id="login-email-error" class="mt-1.5 hidden text-sm text-red-600"></p>
        </div>
        <div>
          <label for="login-password" class="mb-2 block text-sm font-medium text-slate-700">Пароль</label>
          <input
            id="login-password"
            type="password"
            autocomplete="current-password"
            class="min-h-12 w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm outline-none ring-blue-600/20 transition focus:border-blue-500 focus:ring-4"
            placeholder="••••••••"
          />
          <p id="login-password-error" class="mt-1.5 hidden text-sm text-red-600"></p>
        </div>
      </div>

      <button
        type="button"
        id="login-submit"
        class="mt-8 flex min-h-12 w-full items-center justify-center rounded-xl bg-blue-600 px-4 text-sm font-semibold text-white shadow-md transition hover:bg-blue-700 active:bg-blue-800"
      >
        Войти
      </button>

      <p class="mt-8 text-center text-sm text-slate-600">
        Нет аккаунта?
        <a href="/register" class="font-semibold text-blue-600 underline-offset-2 hover:text-blue-700 hover:underline"
          >Регистрация</a
        >
      </p>
    </main>
    <script src="/login.js"></script>
  </body>
</html>
